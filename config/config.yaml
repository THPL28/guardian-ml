# Guardian-ML Configuration

# ============================================================================
# DATA CONFIGURATION
# ============================================================================
data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  feature_store_path: "data/feature_store/"
  
  # Data generation parameters
  n_transactions: 1_000_000  # Scale: 1M transactions (represents daily volume)
  fraud_rate: 0.003  # 0.3% fraud rate (realistic for payments)
  
  # Data splits
  train_size: 0.7
  val_size: 0.15
  test_size: 0.15
  
  # Data validation
  missing_threshold: 0.05  # Alert if > 5% missing
  categorical_cardinality_limit: 100
  numeric_outlier_threshold: 5.0  # Standard deviations

# ============================================================================
# FEATURE STORE CONFIGURATION
# ============================================================================
features:
  version: "1.0.0"
  
  # Feature groups
  user_features:
    - user_age_group
    - user_account_age_days
    - user_transaction_count_30d
    - user_fraud_report_count
    - user_country_risk_score
    
  transaction_features:
    - amount_log
    - amount_normalized
    - time_of_day
    - day_of_week
    - is_weekend
    - is_night
    - transaction_frequency_1h
    - transaction_frequency_24h
    
  merchant_features:
    - merchant_category_risk
    - merchant_transaction_count_30d
    - merchant_chargeback_rate
    - merchant_fraud_rate
    
  device_features:
    - device_type_encoded
    - device_fraud_rate_30d
    - device_new_merchant_rate
    
  relationship_features:
    - user_merchant_interaction_count
    - user_country_merchant_country_match
    - user_device_merchant_anomaly_score

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
models:
  baseline:
    type: "logistic_regression"
    hyperparams:
      C: 1.0
      max_iter: 1000
      solver: "lbfgs"
      
  xgboost:
    type: "xgboost"
    hyperparams:
      n_estimators: 200
      max_depth: 7
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.7
      scale_pos_weight: 100  # Account for class imbalance
      
  neural_net:
    type: "neural_network"
    architecture:
      layers: [128, 64, 32, 1]
      activation: "relu"
      dropout_rate: 0.3
      batch_normalization: true
    hyperparams:
      epochs: 50
      batch_size: 256
      learning_rate: 0.001
      optimizer: "adam"

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================
training:
  random_seed: 42
  
  # Cross-validation
  cv_strategy: "stratified_k_fold"
  cv_folds: 5
  
  # Class balancing
  balance_strategy: "smote"  # or "class_weights", "undersampling"
  
  # Hyperparameter tuning
  hyperparameter_tuning:
    enabled: true
    method: "optuna"  # or "grid_search", "random_search"
    n_trials: 100
    sampler: "tpe"  # Tree-structured Parzen Estimator
    
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    metric: "auc"

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================
evaluation:
  # Primary metric
  primary_metric: "auc_roc"
  
  # Metrics to track
  metrics:
    - auc_roc
    - auc_pr
    - precision_at_recall_80
    - recall_at_precision_95
    - f1_score
    - confusion_matrix
    
  # Statistical evaluation
  confidence_level: 0.95
  bootstrap_samples: 1000
  
  # Threshold optimization
  optimize_threshold: true
  threshold_metric: "f2"  # Favor recall over precision
  
  # Business metrics
  cost_fp: 8.0  # Cost of false positive (fraud alert on legitimate)
  cost_fn: 2000.0  # Cost of false negative (undetected fraud)

# ============================================================================
# MLOPS CONFIGURATION
# ============================================================================
mlops:
  # MLflow
  mlflow:
    tracking_uri: "sqlite:///mlflow.db"
    experiment_name: "fraud_detection"
    runs_per_model: 5
    
  # Model versioning
  model_registry:
    backend: "mlflow"
    production_stage_threshold_auc: 0.92
    
  # Monitoring
  monitoring:
    enabled: true
    drift_detection: true
    drift_threshold: 0.05
    
    # Data drift detection (PSI)
    psi_threshold: 0.1
    
    # Prediction drift
    prediction_std_threshold: 0.15
    
  # Re-training
  retraining:
    schedule: "weekly"  # or "daily", "monthly"
    automatic_trigger: true
    trigger_drift_threshold: 0.08
    
  # Logging
  logging:
    level: "INFO"
    format: "json"  # For centralized logging (ELK, Splunk, etc)

# ============================================================================
# INFERENCE CONFIGURATION
# ============================================================================
inference:
  # Real-time serving
  serving:
    backend: "fastapi"
    port: 8000
    workers: 4
    
  # Caching
  cache:
    enabled: true
    backend: "redis"
    redis_url: "redis://localhost:6379"
    ttl_seconds: 3600
    
  # Feature computation
  feature_latency_budget_ms: 5
  model_latency_budget_ms: 3
  total_latency_budget_ms: 10
  
  # Batch inference
  batch:
    enabled: true
    batch_size: 10000
    schedule: "hourly"

# ============================================================================
# INFRASTRUCTURE CONFIGURATION
# ============================================================================
infrastructure:
  # Distributed computing
  spark:
    master: "local[*]"  # or "spark://master:7077"
    app_name: "fraud_detection"
    executor_memory: "4g"
    executor_cores: 4
    
  # Docker
  docker:
    image_name: "fraud_detection:latest"
    registry: "docker.io"
    
  # Kubernetes
  kubernetes:
    enabled: false
    namespace: "fraud-detection"
    replicas: 3
    hpa_enabled: true
    hpa_target_cpu: 70

# ============================================================================
# EXPERIMENT TRACKING
# ============================================================================
experiments:
  version: "1.0"
  baseline_auc: 0.78
  target_auc: 0.95
  
  # A/B testing
  ab_testing:
    enabled: true
    confidence_level: 0.95
    power: 0.8
    min_sample_size: 100000
