name: CI/CD - Code Quality & Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ========================================================================
  # CODE QUALITY CHECKS
  # ========================================================================
  
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install flake8 black mypy
      
      - name: Run Black (formatter)
        run: black --check src/ tests/ mlops/
      
      - name: Run Flake8 (linter)
        run: flake8 src/ tests/ mlops/ --max-line-length=100
      
      - name: Run MyPy (type checker)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Type checking is optional

  # ========================================================================
  # UNIT TESTS
  # ========================================================================
  
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ========================================================================
  # MODEL TRAINING & VALIDATION
  # ========================================================================
  
  train-models:
    name: Model Training & Validation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'  # Only on push, not on PR
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Generate training data
        run: python src/data_pipeline.py
      
      - name: Engineer features
        run: python src/feature_engineering.py
      
      - name: Train models
        run: python src/models.py
      
      - name: Evaluate & compare
        run: |
          python -c "
          from src.evaluation import RigourousEvaluator
          print('✓ Models trained and evaluated')
          "
      
      - name: Upload model artifacts
        uses: actions/upload-artifact@v3
        with:
          name: models
          path: models/
          retention-days: 7

  # ========================================================================
  # DOCKER BUILD & PUSH
  # ========================================================================
  
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'  # Only on main branch
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./mlops/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guardian-ml:latest
            ${{ secrets.DOCKER_USERNAME }}/guardian-ml:${{ github.sha }}

  # ========================================================================
  # SECURITY CHECKS
  # ========================================================================
  
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Bandit (security scanner)
        run: pip install bandit
      
      - name: Run Bandit
        run: bandit -r src/ mlops/ --exit-code 0
        continue-on-error: true

  # ========================================================================
  # NOTIFY RESULTS
  # ========================================================================
  
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test, train-models]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Tests failed!"
            exit 1
          else
            echo "✅ All checks passed!"
          fi
